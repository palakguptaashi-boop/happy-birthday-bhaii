<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: #fff;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
}

.message {
  font-size: 1.2rem;
  margin: 20px 0;
}

.gallery img {
  width: 100%;
  max-width: 300px;
  margin: 10px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.timer {
  font-size: 1.5rem;
  margin-top: 20px;
}

@media (max-width: 600px) {
  h1 { font-size: 2rem; }
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
  <h1>🎂 Happy 16th Birthday! 🎂</h1>

  <p class="message">
    Today marks a beautiful milestone — turning 16! 🎉
    May your life be filled with happiness, success, and unforgettable memories.
    Keep smiling, keep shining, and never stop chasing your dreams.
  </p>

  <div class="gallery">
    <!-- Replace with your image paths -->
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>

  <div class="timer" id="timer"></div>
</div>

<script>
// Countdown Timer
const birthday = new Date("2026-12-01T00:00:00"); // change date

function updateTimer() {
  const now = new Date();
  const diff = birthday - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("timer").innerHTML =
    `⏳ Countdown: ${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateTimer, 1000);

// Confetti Animation
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
for (let i = 0; i < 100; i++) {
  pieces.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 6 + 4,
    d: Math.random() * 100
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#fff";

  pieces.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
    ctx.fill();
  });

  update();
}

function update() {
  pieces.forEach(p => {
    p.y += Math.cos(p.d) + 1;
    p.x += Math.sin(p.d);

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(draw, 20);
</script>

</body>
</html>
